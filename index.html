<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="sys.dao — cyber daily operating system" />
    <title>sys.dao</title>

    <!-- 字體預連線（縮短 handshake） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://chinese-fonts-cdn.deno.dev" crossorigin />

    <!-- Google Fonts 一次載入：
         · 中文標題  Cactus Classical Serif（仙人掌古典宋體，鐵畫銀鉤鋒利感）
         · 中文內文  Noto Sans HK（香港黑體字形，比 TC 更方正銳利）+ Noto Serif TC（標題備用）
         · 英文顯示  Chakra Petch（賽博龐克棱角）+ Orbitron / Rajdhani（次級回退）
         · 等寬     JetBrains Mono（tnum + slashed zero） -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700;800&family=Noto+Sans+HK:wght@300;400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;500;600;700;900&family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
    />

    <!-- 第三方中文字：LXGW WenKai（霞鶩文楷，細節典雅補色） -->
    <link
      rel="stylesheet"
      href="https://chinese-fonts-cdn.deno.dev/packages/lxgwwenkai/dist/LXGWWenKai-Regular/result.css"
    />
    <link
      rel="stylesheet"
      href="https://chinese-fonts-cdn.deno.dev/packages/lxgwwenkai/dist/LXGWWenKai-Bold/result.css"
    />

    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #000;
        color: #fff;
        font-family:
          'Noto Sans HK', 'Noto Sans TC',
          -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        /* OpenType：tabular 數字對齊、中文標點壓縮、視覺對齊 */
        font-feature-settings: 'tnum' 1, 'halt' 1, 'vpal' 1, 'palt' 1;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      *, *::before, *::after { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
